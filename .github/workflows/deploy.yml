name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/wooter/bokesensoep

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "image_tag=$REF_NAME" >> $GITHUB_OUTPUT
            echo "deploy_dir=~/bokesensoep/prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=acc" >> $GITHUB_OUTPUT
            echo "image_tag=acc" >> $GITHUB_OUTPUT
            echo "deploy_dir=~/bokesensoep/acc" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.env.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to fsn1
        env:
          DEPLOY_DIR: ${{ steps.env.outputs.deploy_dir }}
          IMAGE_TAG: ${{ steps.env.outputs.image_tag }}
          SSH_KEY: ${{ secrets.FSN1_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H fsn1 >> ~/.ssh/known_hosts 2>/dev/null
          ssh wouter@fsn1 "cd $DEPLOY_DIR && sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG='\"$IMAGE_TAG\"'/' .env && docker compose pull && docker compose up -d"
